<!DOCTYPE html> 
<html>
<head>
<meta charset="UTF-8">
<title>Mock Test</title>

<style>
body{margin:0;font-family:Arial;background:#f2f3f7}

.header{
position:fixed;
top:0;
left:0;
width:98%;
z-index:1000;
background:#2c5f8a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.topRight{text-align:right}



.main{
display:flex;
padding:5px;
margin-top:60px;   /* important */
}


.left{
width:70%;
background:white;
padding:20px;
border-radius:6px;
}

.right{
width:30%;
margin-left:15px;
background:white;
padding:15px;
border-radius:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(40px,1fr));
gap:6px;
}

.grid button{
height:40px;
border:none;
background:#ddd;
cursor:pointer;
font-weight:bold;
}

.answered{background:#4caf50;color:white}

.options label{
display:block;
margin:12px 0;
padding:6px;
cursor:pointer;
border-radius:4px;
}

.correctOpt{background:#008000;color:white;} 
.wrongOpt{background:#f44336;color:white}
.notAttemptYellow{background:#ffeb3b;}

.controls{margin-top:20px}

button{padding:8px 12px;cursor:pointer}

.resultBox{
display:none;
background:white;
margin:80px 20px 20px 20px;
padding:20px;
border-radius:6px;
}
#question{
white-space:pre-line;
}

</style>
</head>
<body>

<div class="header">
<div>
<strong>Mock Test Portal</strong><br>
Candidate: Riya
</div>
<div class="topRight">
Total Marks: <span id="totalMarks"></span><br>
Time Left: <span id="timer">00:00</span>
</div>
</div>

<div class="main" id="examArea">

<div class="left">
<h3 id="question"></h3>
<div id="options" class="options"></div>

<div class="controls">
<button onclick="saveNext()">Save & Next</button>
</div>
</div>

<div class="right">
<h4>Questions</h4>
<div class="grid" id="palette"></div>
<br>
<button onclick="submitExam()">Submit Test</button>
</div>

</div>

<div class="resultBox" id="resultBox"></div>

<script>

/* ========= QUESTIONS ========= */
const examDurationMinutes = 60;

const questions = [

{question:"Which institution is primarily responsible for maintaining law and order in society?",options:["Police","Court","Prison","Legislature"],answer:0},
{question:"Which law provides legal procedures for criminal trials in India?",options:["CrPC","IPC","Evidence Act","Police Act"],answer:0},
{question:"The Indian Evidence Act was enacted in which year?",options:["1872","1860","1908","1950"],answer:0},
{question:"Which type of crime involves misuse of computer systems and networks?",options:["Cyber crime","White collar crime","Blue collar crime","Organized crime"],answer:0},
{question:"Which organization maintains national crime statistics in India?",options:["National Crime Records Bureau","Central Bureau of Investigation","Supreme Court","Reserve Bank of India"],answer:0},

{question:"Which branch of science helps in identifying criminals using fingerprints and DNA?",options:["Forensic science","Biology","Chemistry","Anthropology"],answer:0},
{question:"The process of recording the first information about a cognizable offence is called",options:["FIR","Charge sheet","Arrest warrant","Investigation"],answer:0},
{question:"Which crime involves unlawful taking away of a person against their will?",options:["Kidnapping","Fraud","Forgery","Extortion"],answer:0},
{question:"Which act protects women from domestic violence in India?",options:["Protection of Women from Domestic Violence Act 2005","Dowry Prohibition Act","POCSO Act","IT Act"],answer:0},
{question:"Sexual Harassment of Women at Workplace Act was passed in",options:["2013","2005","2010","2015"],answer:0},

{question:"Which crime involves illegal demand of money for marriage?",options:["Dowry","Cyber fraud","Money laundering","Tax evasion"],answer:0},
{question:"Which crime involves illegal selling and buying of drugs?",options:["Drug trafficking","Cyber crime","Human trafficking","Robbery"],answer:0},
{question:"Which act deals specifically with narcotic drugs and psychotropic substances?",options:["NDPS Act","IT Act","IPC","CrPC"],answer:0},
{question:"Which concept explains crime caused by social pressure and lack of opportunities?",options:["Strain theory","Functionalism","Conflict theory","Labeling theory"],answer:0},
{question:"Which theory explains that crime occurs when motivated offenders meet suitable targets without guardianship?",options:["Routine activity theory","Strain theory","Conflict theory","Control theory"],answer:0},

{question:"Which field studies the causes, consequences and prevention of crime?",options:["Criminology","Economics","Political science","Psychology"],answer:0},
{question:"Which punishment system focuses on reforming offenders?",options:["Correctional system","Military system","Economic system","Administrative system"],answer:0},
{question:"Which crime involves illegal copying of software or digital content?",options:["Digital piracy","Burglary","Kidnapping","Fraud"],answer:0},
{question:"Which social issue involves discrimination based on caste?",options:["Caste conflict","Cyber crime","White collar crime","Corporate crime"],answer:0},
{question:"Which crime involves attacking a person with corrosive substances?",options:["Acid attack","Cyber attack","Fraud","Arson"],answer:0},

{question:"Which institution decides the guilt or innocence of accused persons?",options:["Court","Police","Prison","Executive"],answer:0},
{question:"Which stage comes after investigation in criminal procedure?",options:["Trial","Arrest","FIR","Patrolling"],answer:0},
{question:"Which crime involves illegal transfer of money through online systems?",options:["Online fraud","Kidnapping","Arson","Extortion"],answer:0},
{question:"Which agency deals with cyber crime investigation in India?",options:["Cyber Crime Cell","RBI","Election Commission","NITI Aayog"],answer:0},
{question:"Which concept explains that criminals are labeled by society and that label influences behaviour?",options:["Labeling theory","Strain theory","Functionalism","Anomie theory"],answer:0},

{question:"Which Article of the Indian Constitution guarantees Right to Equality?",options:["Article 14","Article 19","Article 21","Article 32"],answer:0},
{question:"Directive Principles of State Policy are mentioned in which part of the Constitution?",options:["Part III","Part IV","Part V","Part VI"],answer:1},
{question:"Which organ of government interprets the law?",options:["Executive","Judiciary","Legislature","Police"],answer:1},
{question:"IPC stands for",options:["Indian Penal Code","Indian Police Code","International Penal Code","Indian Public Code"],answer:0},
{question:"CrPC deals with",options:["Civil cases","Criminal procedure","Administrative law","Taxation"],answer:1},

{question:"The concept of White Collar Crime was introduced by",options:["Edwin Sutherland","Cesare Lombroso","Emile Durkheim","Robert Merton"],answer:0},
{question:"Which theory explains crime as a learned behaviour?",options:["Differential Association","Strain Theory","Conflict Theory","Labeling Theory"],answer:0},
{question:"The study of victims is called",options:["Victimology","Penology","Criminalistics","Sociology"],answer:0},
{question:"Penology deals with the study of",options:["Punishment","Victims","Police","Courts"],answer:0},
{question:"Which act deals with sexual offences against children?",options:["POCSO Act","IT Act","Dowry Act","NDPS Act"],answer:0},

{question:"Juvenile Justice Act deals with",options:["Children in conflict with law","Women crimes","Cyber crimes","Economic crimes"],answer:0},
{question:"Domestic Violence Act in India was enacted in",options:["2005","2010","1998","2015"],answer:0},
{question:"Dowry Prohibition Act was enacted in",options:["1961","1975","1986","1995"],answer:0},
{question:"Human trafficking refers to",options:["Illegal trade of humans","Drug trade","Weapon trade","Wildlife trade"],answer:0},
{question:"Cyber crime mainly involves",options:["Computers and internet","Agriculture","Transport","Manufacturing"],answer:0},

{question:"FIR stands for",options:["First Information Report","Final Investigation Record","Federal Information Record","First Incident Report"],answer:0},
{question:"Which agency investigates serious crimes in India?",options:["CBI","RBI","SEBI","NITI Aayog"],answer:0},
{question:"DNA profiling is used in",options:["Crime investigation","Agriculture","Economics","Education"],answer:0},
{question:"Fingerprint analysis belongs to",options:["Forensic science","Criminology","Psychology","Sociology"],answer:0},
{question:"Forensic toxicology studies",options:["Poisons","Fingerprints","Blood groups","Weapons"],answer:0},

{question:"Acid attack is categorized as",options:["Crime against women","Property crime","Cyber crime","Economic crime"],answer:0},
{question:"Child labour refers to",options:["Employment of children below legal age","Adult employment","Volunteer work","Factory labour"],answer:0},
{question:"Child marriage refers to marriage below",options:["Legal age","Voting age","School age","Working age"],answer:0},
{question:"Drug addiction is considered a",options:["Social problem","Economic reform","Political movement","Agricultural practice"],answer:0},
{question:"Juvenile delinquency means",options:["Crime by minors","Crime by adults","Cyber crime","Corporate crime"],answer:0},

{question:"Police is part of which system?",options:["Criminal justice system","Economic system","Political system","Educational system"],answer:0},
{question:"Courts are part of",options:["Judiciary","Executive","Legislature","Police"],answer:0},
{question:"Prisons are part of",options:["Correctional system","Education system","Economic system","Political system"],answer:0},
{question:"Which theory links crime with social inequality?",options:["Conflict theory","Functionalism","Phenomenology","Interactionism"],answer:0},
{question:"Organized crime involves",options:["Criminal groups","Individuals","NGOs","Government"],answer:0},

{question:"Terrorism is generally defined as",options:["Violence for political purpose","Economic policy","Cultural activity","Legal reform"],answer:0},
{question:"Money laundering refers to",options:["Concealing illegal money","Tax payment","Legal banking","Savings"],answer:0},
{question:"Corruption involves",options:["Abuse of public power","Public welfare","Legal justice","Education reform"],answer:0},
{question:"Cyber fraud involves",options:["Online deception","Physical robbery","Kidnapping","Arson"],answer:0},
{question:"Hacking refers to",options:["Unauthorized access to computer","Legal browsing","Data backup","Software testing"],answer:0},

{question:"Community policing focuses on",options:["Public participation","Military control","Corporate management","Political power"],answer:0},
{question:"Victim compensation schemes relate to",options:["Victim rights","Police rights","Judicial rights","Prison rights"],answer:0},
{question:"Caste conflict is an example of",options:["Social conflict","Cyber crime","Economic crime","Corporate crime"],answer:0},
{question:"Communal violence is based on",options:["Religion","Technology","Agriculture","Trade"],answer:0},
{question:"Kidnapping is categorized as",options:["Crime against person","Property crime","Cyber crime","Political crime"],answer:0},

{question:"Criminology is the study of",options:["Crime and criminals","Agriculture","Economics","Trade"],answer:0},
{question:"Which law deals with evidence in courts?",options:["Indian Evidence Act","IPC","CrPC","Police Act"],answer:0},
{question:"NDPS Act deals with",options:["Drugs and narcotics","Cyber crime","Property crime","Traffic law"],answer:0},
{question:"IT Act in India deals with",options:["Cyber law","Property law","Family law","Labour law"],answer:0},
{question:"Which crime targets online identity?",options:["Identity theft","Arson","Burglary","Robbery"],answer:0},

{question:"Social disorganization theory focuses on",options:["Community breakdown","Economic growth","Political reform","Industrialization"],answer:0},
{question:"Routine activity theory was proposed by",options:["Cohen and Felson","Durkheim","Becker","Merton"],answer:0},
{question:"Anomie concept was given by",options:["Durkheim","Lombroso","Becker","Sutherland"],answer:0},
{question:"Labeling theory was developed by",options:["Howard Becker","Durkheim","Merton","Marx"],answer:0},
{question:"Differential association theory was proposed by",options:["Edwin Sutherland","Durkheim","Lombroso","Becker"],answer:0}



];

/* ============================= */

let current=0;
let userAnswers=[];
let time=examDurationMinutes*60;
let timerInterval;
document.getElementById("totalMarks").innerText = questions.length*4;

function loadQuestion(){
document.getElementById("question").innerText =
"Q"+(current+1)+": "+questions[current].question;

let html="";
questions[current].options.forEach((opt,i)=>{
html+=`
<label>
<input type="radio" name="opt" value="${i}" onclick="toggleOption(this)">
${opt}
</label>`;
});
document.getElementById("options").innerHTML=html;

if(userAnswers[current]!=undefined){
document.querySelectorAll("input[name=opt]")[userAnswers[current]].checked=true;
}
}

function toggleOption(radio){
if(radio.wasChecked){
radio.checked=false;
radio.wasChecked=false;
}else{
let radios=document.getElementsByName("opt");
Array.from(radios).forEach(r=>r.wasChecked=false);radio.wasChecked=true;
}
}

function saveNext(){
let selected=document.querySelector("input[name=opt]:checked");

if(selected){
userAnswers[current]=parseInt(selected.value);
document.getElementById("btn"+current).classList.add("answered");
}

if(current<questions.length-1){
current++;
loadQuestion();
}else{
submitExam();
}
}

function buildPalette(){
let html="";
for(let i=0;i<questions.length;i++){
html+=`<button id="btn${i}" onclick="go(${i})">${i+1}</button>`;
}
document.getElementById("palette").innerHTML=html;
}

function go(i){
current=i;
loadQuestion();
}

function startTimer(){
timerInterval=setInterval(()=>{
let m=Math.floor(time/60);
let s=time%60;
document.getElementById("timer").innerText=
(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
time--;
if(time<0){
clearInterval(timerInterval);
submitExam();
}
},1000);
}

function submitExam(){
clearInterval(timerInterval); 
document.getElementById("examArea").style.display="none";
document.getElementById("resultBox").style.display="block";

let score=0;
let correctCount=0;
let wrongCount=0;
let attemptedCount=0;
let notAttemptedCount=0;
let analysis="";

questions.forEach((q,i)=>{

let correct=q.answer;
let user=userAnswers[i];
let marks=0;

if(user!==undefined){
attemptedCount++;
if(user==correct){
marks=4;
score+=4;
correctCount++;
}else{
marks=-1;
score-=1;
wrongCount++;
}
}else{
notAttemptedCount++;
}

analysis+=`<div>
<h4>Q${i+1}: ${q.question}</h4>`;

q.options.forEach((opt,index)=>{

let className="";

if(user !== undefined){  

    if(user == correct){  
        if(index == correct){
            className="correctOpt";  
        }
    }else{
        if(index == user){
            className="wrongOpt";     
        }
        if(index == correct){
            className="correctOpt";   
        }
    }

}else{
    if(index == correct){
        className="notAttemptYellow";   
    }
}

analysis+=`<div class="${className}" style="padding:6px;margin:4px 0;border-radius:4px;">
${opt}
</div>`;

});

let markStyle="";
if(marks==4){ markStyle="color:green;font-weight:bold"; }
if(marks==-1){ markStyle="color:red;font-weight:bold"; }

analysis+=`Marks: <span style="${markStyle}">${marks>0?"+4":marks}</span><hr></div>`;

});

document.getElementById("resultBox").innerHTML=
`
<h2>Total Score: ${score} / ${questions.length*4}</h2>

<p><strong>Total Questions:</strong> ${questions.length}</p>
<p><strong>Attempted:</strong> ${attemptedCount}</p>
<p><strong>Not Attempted:</strong> ${notAttemptedCount}</p>
<p style="color:green;"><strong>Correct:</strong> ${correctCount}</p>
<p style="color:red;"><strong>Wrong:</strong> ${wrongCount}</p>

<button onclick="location.reload()">Retake Test</button>
<h3>Detailed Analysis:</h3>
${analysis}
`;
}

loadQuestion();
buildPalette();
startTimer();

</script>

</body>
</html>
